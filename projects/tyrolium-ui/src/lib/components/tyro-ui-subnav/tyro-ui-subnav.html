<div class="subnav" [class.fixed]="isFixed">
  <div class="subnav-row">
      @for (page of pages; track page) {
          <a class="subnav-item" [routerLink]="page.link" routerLinkActive="active" TyroUiGloss>
              {{ page.label }}
          </a>
      }
  </div>
</div>
@if (isFixed && havePlaceholder) {
  <div class="subnav-placeholder"></div>
}
