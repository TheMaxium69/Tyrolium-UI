<div class="subnav" [class.fixed]="isFixed">
  <div class="subnav-row">
      @for (page of pages; track page; let i = $index) {
          <a class="subnav-item" [id]="'subnav-item-' + i" [routerLink]="page.link" routerLinkActive="active"
             TyroUiGloss
             [style.--active-bg-color]="page.color || '#000000'">
              {{ page.label }}
          </a>
      }
  </div>
</div>
@if (isFixed && havePlaceholder) {
  <div class="subnav-placeholder"></div>
}
